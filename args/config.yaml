# Configuration - Générateur de PowerPoint Paroissial
# Phase Link - Paramètres API, design, typographie

# --- Format de présentation ---
presentation:
  aspect_ratio: "16:9"  # Widescreen (13.333" x 7.5")
  # alternative: "4:3" (10" x 7.5")

# --- API AELF ---
aelf:
  base_url: "https://api.aelf.org"
  endpoints:
    messes: "/v1/messes/{date}/{zone}"
    informations: "/v1/informations/{date}/{zone}"
  zone_default: "france"
  timeout_seconds: 10

# --- Design des slides (phase Context) ---
design:
  background:
    type: "color"  # color | image
    # Lectures et messages : bleu nuit
    color: "#0a1628"
    # Chants : vert très sombre (différencié)
    color_chant: "#0d2818"
    # Messages : optionnel, sinon même que lectures
    # color_message: "#1a0a28"
  text:
    color: "#FFFFFF"
    font: "Calibri"
    size: 34
    size_min: 24
  title_rappel:
    size: 20
    color: "#CCCCCC"
  alignment:
    horizontal: "center"  # left | center | right
    vertical: "center"    # top | center | bottom
  # Thème : fond foncé / texte clair OU fond clair / texte foncé
  theme_colors:
    dark:
      background: { color: "#0a1628", color_chant: "#0d2818" }
      text: "#FFFFFF"
      title_rappel: "#CCCCCC"
    light:
      background: { color: "#f5f5f5", color_chant: "#e8f0e8" }
      text: "#1a1a1a"
      title_rappel: "#444444"

# --- Découpage intelligent (hardprompts) ---
slicing:
  max_words_per_slide: 50
  separators_priority: [". ", "; ", ", ", " "]

# --- Base de données chants ---
db:
  path: "data/chants.db"
  # Alternative JSON :
  # json_path: "data/chants.json"
